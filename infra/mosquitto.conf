# Vekka mosquitto config — managed by README setup step.
#
# macOS (Homebrew) paths shown below.
# On Linux, swap:
#   /opt/homebrew/etc/mosquitto/vakka_passwd  ->  /etc/mosquitto/vakka_passwd
#   /opt/homebrew/var/mosquitto/              ->  /var/lib/mosquitto/
listener 1883 127.0.0.1
allow_anonymous false
password_file /opt/homebrew/etc/mosquitto/vakka_passwd
persistence true
persistence_location /opt/homebrew/var/mosquitto/
log_dest stderr
